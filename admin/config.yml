# ============================================================
# ⚠️  DUPLICATION WARNING
# Blog Posts and Island Stories share identical fields.
# If you add, rename, or remove a field, update it in BOTH
# the "posts" collection AND the "stories" collection below.
# ============================================================

backend:
  name: github
  repo: discover360news-max/my-caribbean-journey
  branch: main
  base_url: https://mycaribbeanjourney.com
  auth_endpoint: /api/auth

media_folder: "blog/images"
public_folder: "/blog/images"

collections:

  # ----------------------------------------
  # Blog Posts — general writing, news, etc.
  # To move to Island Stories: change
  # "Collection Type" to Island Story and save.
  # ----------------------------------------
  - name: "posts"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "blog/posts"
    create: true
    slug: "{{slug}}"
    filter: {field: "type", value: "post"}
    summary: "{{title}} · {{date}} · {{category}}"
    sortable_fields: ['date', 'title']
    view_filters:
      - label: "Drafts"
        field: draft
        pattern: true
      - label: "Published"
        field: draft
        pattern: false
    fields:

      - label: "Title"
        name: "title"
        widget: "string"

      # ── Classification ──────────────────────
      - label: "Collection Type"
        name: "type"
        widget: "select"
        default: "post"
        hint: "Change this to move the post into a different collection."
        options:
          - { label: "Blog Post",    value: "post"  }
          - { label: "Island Story", value: "story" }

      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        options:
          - { label: "Culture & Heritage", value: "culture" }
          - { label: "History",            value: "history" }
          - { label: "Travel & Expat",     value: "travel"  }
          - { label: "Food & Traditions",  value: "food"    }
          - { label: "Music & Arts",       value: "music"   }
          - { label: "News & Updates",     value: "news"    }

      # ── Status flags ────────────────────────
      - label: "Save as Draft"
        name: "draft"
        widget: "boolean"
        default: false
        required: false
        hint: "Drafts are not shown on the live site until this is turned off."

      - label: "Featured Post"
        name: "featured"
        widget: "boolean"
        default: false
        required: false
        hint: "Pin this post to the top of the blog listing."

      # ── Cover & meta ────────────────────────
      - label: "Featured Image"
        name: "featuredImage"
        widget: "image"
        required: false
        hint: "Cover image shown on the blog listing and at the top of the post."

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        default: ""

      - label: "Author"
        name: "author"
        widget: "string"
        default: "Quincy"
        required: false

      # ── SEO overrides ─────────────────────────
      - label: "SEO Title"
        name: "seoTitle"
        widget: "string"
        required: false
        hint: "Custom title for search engines and browser tabs. Defaults to the post title if blank. Aim for under 60 characters."

      - label: "SEO Description"
        name: "seoDescription"
        widget: "text"
        required: false
        hint: "Custom meta description shown in search results. Defaults to the excerpt if blank. Aim for 120–155 characters."

      # ── Listen / Watch ────────────────────────
      - label: "YouTube Video ID"
        name: "youtubeId"
        widget: "string"
        required: false
        hint: "Paste just the video ID from the YouTube URL — e.g. if the URL is youtube.com/watch?v=dQw4w9WgXcQ, paste dQw4w9WgXcQ. Leave blank until the video is published."

      - label: "Audio Tracks"
        name: "audioTracks"
        widget: "list"
        required: false
        hint: "Add one entry per audio part. Label is optional — shown on the playlist button if there are multiple tracks."
        fields:
          - label: "Label (optional)"
            name: "title"
            widget: "string"
            required: false
            hint: "e.g. Part 1, or leave blank"
          - label: "Audio URL"
            name: "url"
            widget: "string"
            hint: "Full R2 URL — e.g. https://media.mycaribbeanjourney.com/..."

      # ── Listing metadata ─────────────────────
      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        hint: "Short summary shown on the blog listing (1–2 sentences)."

      - label: "Tags"
        name: "postTags"
        widget: "list"
        required: false
        hint: "Lowercase, press Enter to add each one. Use hyphens for multi-word tags. Currently in use: colonialism, coralreef, culture, history, les-coteau, pride, tobago."

      # ── Content ──────────────────────────────
      - label: "Body"
        name: "body"
        widget: "markdown"
        editor_components: ['code-block', 'data-table', 'callout', 'youtube', 'spotify', 'pull-quote', 'definition', 'image-caption', 'gallery', 'cta-button']

      - label: "References & Further Reading"
        name: "references"
        widget: "markdown"
        required: false
        hint: "Sources and further reading. ⚠️ Always use bullet points — start each reference with '- ' on its own line. Example: '- Smith, J. [Article title](https://url.com)'. Do NOT use numbered lists or plain paragraphs — bullet format is required or the editor will crash."

  # ----------------------------------------
  # Island Stories — longer narrative writing
  # To move to Blog Posts: change
  # "Collection Type" to Blog Post and save.
  # ----------------------------------------
