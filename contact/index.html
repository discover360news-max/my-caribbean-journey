<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — My Caribbean Journey</title>
  <meta name="description" content="Get in touch with My Caribbean Journey. Questions about the book, wholesale enquiries, or just want to say hello.">
  <link rel="canonical" href="https://mycaribbeanjourney.com/contact/">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/images/my-caribbean-journey-tpbg-sm.png">
  <link rel="apple-touch-icon" href="/images/my-caribbean-journey-tpbg-sm.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/shared/shared.css">
  <link rel="stylesheet" href="css/contact.css">
</head>
<body>

  <div id="site-nav"></div>

  <!-- Hero -->
  <section class="contact-hero">
    <div class="container">
      <p class="section-label">Get in Touch</p>
      <h1 class="contact-hero-title">Say Hello</h1>
      <p class="contact-hero-desc">Questions about the book, wholesale enquiries, or just want to connect — we'd love to hear from you.</p>
    </div>
  </section>

  <!-- Form -->
  <section class="contact-body">
    <div class="container">
      <div class="contact-card" id="contact-form-wrap">
        <form class="contact-form" id="contact-form" novalidate>
          <div class="contact-field">
            <label class="contact-label" for="contact-name">Name</label>
            <input class="contact-input" type="text" id="contact-name" name="name" placeholder="Your name" autocomplete="given-name" required>
            <span class="contact-field-error" id="error-name"></span>
          </div>
          <div class="contact-field">
            <label class="contact-label" for="contact-email">Email</label>
            <input class="contact-input" type="email" id="contact-email" name="email" placeholder="your@email.com" autocomplete="email" required>
            <span class="contact-field-error" id="error-email"></span>
          </div>
          <div class="contact-field">
            <label class="contact-label" for="contact-message">Message</label>
            <textarea class="contact-input contact-textarea" id="contact-message" name="message" placeholder="What's on your mind?" rows="6" required></textarea>
            <span class="contact-field-error" id="error-message"></span>
          </div>
          <span class="contact-form-error" id="error-form"></span>
          <button type="submit" class="btn btn-primary btn-large contact-submit" id="contact-submit">
            Send Message
          </button>
        </form>

        <!-- Success state -->
        <div class="contact-success" id="contact-success" hidden>
          <div class="contact-success-icon">✦</div>
          <h2 class="contact-success-title">Message sent!</h2>
          <p class="contact-success-desc">Thanks for reaching out. Quincy will get back to you soon.</p>
          <a href="/" class="btn btn-outline-dark">Back to Home</a>
        </div>
      </div>

      <p class="contact-alt">
        Prefer email directly?
        <a href="mailto:booksbyquincy@gmail.com" class="contact-alt-link">booksbyquincy@gmail.com</a>
      </p>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="/shared/components.js"></script>
  <script>
    window._mcjCrumbs = [
      { label: 'Home', href: '/' },
      { label: 'Contact' }
    ];
    SiteComponents.init({
      navLinks: [
        { label: 'Home',         href: '/' },
        { label: 'I Am Tobago',  href: '/i-am-tobago/' },
        { label: 'Tobago Guide', href: '/my-tobago-guide/' },
        { label: 'Essays',       href: '/blog/' },
        SiteComponents.cta('i-am-tobago')
      ],
      footerLinks: [
        { label: 'Home',          href: '/' },
        { label: 'I Am Tobago',   href: '/i-am-tobago/' },
        { label: 'Tobago Guide',  href: '/my-tobago-guide/' },
        { label: 'Essays',         href: '/blog/' }
      ]
    });
  </script>
  <script src="/shared/support.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
